name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          install-only: true

      - name: Lint (threshold 5)
        run: |
          set +e
          OUTPUT=$(golangci-lint run ./... 2>&1)
          ISSUES=$(echo "$OUTPUT" | grep -cE "^.+:[0-9]+:[0-9]+:" || true)
          echo "$OUTPUT"
          echo "---"
          echo "Lint issues found: $ISSUES"
          if [ "$ISSUES" -gt 5 ]; then
            echo "::error::Lint issues ($ISSUES) exceed threshold of 5"
            exit 1
          fi

      - name: Format check
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::These files are not formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi
